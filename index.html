<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Code — Learn Code by Medic Adrenaline</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-view" class="view active">
  <div class="login-glow"></div>
  <div class="login-box">
    <div class="login-logo">Let's<span>Code</span></div>
    <div class="login-sub">// learn code by Medic Adrenaline</div>
    <div class="login-tagline">Do you want to start your programming journey?</div>
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('student')">STUDENT</div>
      <div class="role-tab" onclick="setRole('mentor')">MENTOR</div>
    </div>
    <div class="field-wrap">
      <label class="field-label">Username</label>
      <input type="text" id="username" placeholder="Enter your name">
    </div>
    <div class="field-wrap">
      <label class="field-label">Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <button class="btn-primary" onclick="login()">Enter Portal →</button>
    <div class="login-error" id="login-error">Invalid credentials. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app-view" class="view">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Let's<span>Code</span></div>
      <div class="sidebar-user">
        <div class="avatar" id="sb-avatar">O</div>
        <div class="user-info">
          <div class="user-name" id="sb-name">Student</div>
          <div class="user-role" id="sb-role">STUDENT</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-bottom">
        <button class="logout-btn" onclick="logout()">⬅ &nbsp;Sign Out</button>
      </div>
    </aside>
    <main class="main" id="main-content"></main>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
